version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      javascript:
        patterns: ["*"]
    ignore:
      - dependency-name: "hardhat"
        update-types: ["version-update:semver-major"]
    labels: ["dependencies", "javascript"]
    commit-message:
      prefix: "build"
      include: "scope"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      python:
        patterns: ["*"]
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "build"
      include: "scope"
